#
# =============================================================================
# PIBL - Archivo de configuración de backends
# =============================================================================
#
# REQUISITOS QUE DEBE CUMPLIR ESTE ARCHIVO:
#   1. Definir la lista de backends (servidores TWS) con formato:
#      backend <IP> <PUERTO>
#   2. Mínimo 3 backends (según el PDF del proyecto)
#   3. Las IPs serán las IPs privadas de las instancias EC2 en AWS
#
# PASOS A TOMAR:
#   - Paso 1: Desplegar 3 instancias EC2 con el TWS corriendo
#   - Paso 2: Obtener la IP privada de cada instancia
#   - Paso 3: Reemplazar las IPs de ejemplo por las reales
#   - Paso 4: El puerto debe coincidir con el que usa el TWS (ej: 8080)
#
# CLAVES PARA EL ÉXITO:
#   - Usar IPs PRIVADAS de AWS (10.x.x.x), NO las públicas
#   - El PIBL y los TWS deben estar en la MISMA VPC/subred
#   - Si un backend se cae, el PIBL debe detectarlo (connect falla)
#     y pasar al siguiente en la rotación Round Robin
#   - Para pruebas locales, usar localhost con puertos diferentes:
#     backend 127.0.0.1 8081
#     backend 127.0.0.1 8082
#     backend 127.0.0.1 8083
# =============================================================================

# Backend servers (TWS instances)
# Formato: backend <IP> <PUERTO>

backend 10.0.1.196 8080
backend 10.0.1.211 8080
backend 10.0.1.147 8080

