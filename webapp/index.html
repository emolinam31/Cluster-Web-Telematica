<!--
  =============================================================================
  webapp/index.html - Página principal de prueba del TWS
  =============================================================================

  REQUISITOS QUE DEBE CUMPLIR ESTE ARCHIVO:
    1. Página HTML válida que el TWS sirve cuando se pide "/" o "/index.html"
    2. Debe incluir:
       - Texto básico para verificar que el servidor responde
       - Links a las otras páginas de prueba (gallery, bigfile, multifiles)
       - Referencia al CSS (css/style.css) para probar que el TWS
         sirve múltiples tipos de archivos
    3. Caso de prueba: GET / → 200 OK, Content-Type: text/html

  CLAVES PARA EL ÉXITO:
    - Esta es la primera página que se prueba al iniciar el TWS
    - Si esta no carga → hay error en file_handler o http_response
    - El link al CSS verifica que el servidor maneja rutas con subdirectorios
    - Mantenerla simple para debugging fácil
  =============================================================================
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TWS - Telematics Web Server</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Telematics Web Server (TWS)</h1>
    <p>Servidor web funcionando correctamente.</p>

            <li><a href="bigfile.html">Archivo grande (~1MB)</a></li>
            <li><a href="multifiles.html">Múltiples archivos</a></li>
        </ul>
    </nav>
</body>
</html>
